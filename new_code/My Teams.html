<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="design_doc_mode" content="canvas">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Teams — Rally</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{--ink-900:#0f172a;--ink-700:#334155;--ink-500:#64748b;--ink-300:#cbd5e1;--ink-100:#e2e8f0;--ink-50:#f1f5f9;--accent:#1d4ed8;--accent-soft:#eff4ff}
*{box-sizing:border-box}
body{margin:0;font-family:'Hanken Grotesk',system-ui,sans-serif;color:var(--ink-900);background:#f8fafc}
.disp{font-family:'Schibsted Grotesk',system-ui,sans-serif}
.frame{background:#fff;border-radius:20px;box-shadow:0 1px 3px rgba(15,23,42,.06)}
.section{width:920px;padding:32px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.hdr-left{display:flex;align-items:center;gap:10px}
.title{font-size:21px;font-weight:700}
.badge{background:var(--ink-50);color:var(--ink-700);font-size:13px;font-weight:600;padding:3px 10px;border-radius:999px}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;border-radius:999px;padding:10px 18px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.card{border:1px solid var(--ink-100);border-radius:16px;padding:18px;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:var(--accent)}
.logo{width:48px;height:48px;border-radius:12px;object-fit:cover;background:var(--ink-50)}
.avatar{width:48px;height:48px;border-radius:12px;background:var(--accent-soft);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.cname{font-size:16px;font-weight:600;margin:12px 0 8px}
.chiprow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chip{font-size:12.5px;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--ink-50);color:var(--ink-700)}
.role-captain{font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;background:var(--accent);color:#fff}
.role-member{font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;background:#fff;color:var(--ink-700);border:1px solid var(--ink-300)}
.members{font-size:13px;color:var(--ink-500);margin-top:4px}
.empty{width:920px;padding:70px 32px;text-align:center;display:flex;flex-direction:column;align-items:center}
.empty-ill{width:88px;height:88px;border-radius:22px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;margin-bottom:22px}
.empty h3{font-size:19px;font-weight:700;margin:0 0 8px}
.empty p{font-size:14.5px;color:var(--ink-500);margin:0 0 22px;max-width:340px;line-height:1.5}
.label{position:absolute;top:-30px;left:0;font-size:13px;font-weight:600;color:var(--ink-500);font-family:'Schibsted Grotesk',sans-serif}
</style>
</head>
<body>

<div style="position:absolute;left:60px;top:80px" class="frame section">
<div class="label">Populated state</div>
<div class="hdr">
<div class="hdr-left"><span class="title disp">My teams</span><span class="badge">4</span></div>
<button class="btn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10" stroke-linecap="round"/></svg>Create team</button>
</div>
<div class="grid">
<div class="card">
<img class="logo" src="https://images.unsplash.com/photo-1560272564-c83b66b1ad12?w=96&h=96&fit=crop" />
<div class="cname disp">Riverside Strikers</div>
<div class="chiprow"><span class="chip">Football</span><span class="role-captain">Captain</span></div>
<div class="members">12 members</div>
</div>
<div class="card">
<div class="avatar disp">PA</div>
<div class="cname disp">Pace Alliance</div>
<div class="chiprow"><span class="chip">Running</span><span class="role-member">Member</span></div>
<div class="members">7 members</div>
</div>
<div class="card">
<div class="avatar disp">NC</div>
<div class="cname disp">Net Cutters</div>
<div class="chiprow"><span class="chip">Tennis</span><span class="role-member">Member</span></div>
<div class="members">4 members</div>
</div>
<div class="card">
<img class="logo" src="https://images.unsplash.com/photo-1541625602330-2277a4c46182?w=96&h=96&fit=crop" />
<div class="cname disp">Spoke &amp; Chain</div>
<div class="chiprow"><span class="chip">Cycling</span><span class="role-captain">Captain</span></div>
<div class="members">9 members</div>
</div>
</div>
</div>

<div style="position:absolute;left:1040px;top:80px" class="frame empty">
<div class="label">Empty state</div>
<div class="empty-ill">
<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="1.6"><circle cx="9" cy="8" r="3"/><path d="M2 20c0-3.3 3-5.5 7-5.5s7 2.2 7 5.5" stroke-linecap="round"/><circle cx="17" cy="7" r="2.4"/><path d="M15.5 13.5c2.7.4 5 2.3 5 5.5" stroke-linecap="round"/></svg>
</div>
<h3 class="disp">You're not on any team yet</h3>
<p>Create a team or ask a captain for an invite link</p>
<button class="btn"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3v10M3 8h10" stroke-linecap="round"/></svg>Create team</button>
</div>

<template id="__bundler_thumbnail"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#1d4ed8"/><text x="50" y="58" font-size="34" fill="#fff" text-anchor="middle" font-family="sans-serif">MT</text></svg></template>
</body>
</html>
