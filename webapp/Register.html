<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Register — Rally</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

<!-- Tailwind via Play CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['var(--font-display)', 'Schibsted Grotesk', 'system-ui', 'sans-serif'],
          sans: ['Hanken Grotesk', 'system-ui', 'sans-serif'],
          mono: ['Geist Mono', 'ui-monospace', 'monospace'],
        },
        colors: {
          ink: { 900: '#0f172a', 700: '#334155', 500: '#64748b', 300: '#cbd5e1', 200: '#cbd5e1', 100: '#e2e8f0', 50: '#f1f5f9' },
          accent: 'var(--accent)',
        },
        borderColor: { DEFAULT: '#e2e8f0' },
      },
    },
  };
</script>

<style>
  :root {
    --accent: #1d4ed8;
    --accent-ink: #1e3a8a;
    --accent-soft: #eff4ff;
    --font-display: 'Schibsted Grotesk';
  }
  body {
    font-family: 'Hanken Grotesk', system-ui, sans-serif;
    color: #0f172a; background: #ffffff;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
  }
  .font-display { font-family: var(--font-display), 'Schibsted Grotesk', system-ui, sans-serif; }
  ::selection { background: color-mix(in srgb, var(--accent) 22%, transparent); }
  .ring-accent:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  image-slot {
    --is-placeholder-color: #64748b;
    background: #0f172a;
    background-image: repeating-linear-gradient(135deg, #1e293b 0, #1e293b 1px, transparent 1px, transparent 13px);
  }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- web component -->
  <script src="image-slot.js"></script>

  <!-- page -->
  <script type="text/babel" src="js/auth.jsx"></script>
</body>
</html>
